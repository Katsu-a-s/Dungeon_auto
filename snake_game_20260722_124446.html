<!DOCTYPE html>
<!--
  Snake Game
  ==========
  A complete, self-contained implementation of the classic Snake game.
  No external dependencies: just HTML + CSS + vanilla JavaScript.
  Open this file directly in any modern web browser to play.

  Controls: Arrow keys or WASD to steer. Space to pause/resume.
  Goal: eat the red food to grow and score points; avoid hitting
  the walls or your own tail.
-->
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake</title>
<style>
  /* Basic dark-themed layout, centered on the page */
  html, body {
    height: 100%;
    margin: 0;
    background: #1e1e2e;
    color: #cdd6f4;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  h1 { margin: 8px 0; letter-spacing: 4px; }
  #hud {
    display: flex;
    gap: 24px;
    margin-bottom: 8px;
    font-size: 18px;
  }
  canvas {
    background: #11111b;
    border: 4px solid #45475a;
    border-radius: 8px;
  }
  #message {
    margin-top: 10px;
    min-height: 24px;
    font-size: 16px;
    color: #f38ba8;
  }
  #hint {
    margin-top: 6px;
    font-size: 13px;
    color: #6c7086;
  }
</style>
</head>
<body>
  <h1>SNAKE</h1>
  <div id="hud">
    <div>Score: <span id="score">0</span></div>
    <div>Best: <span id="best">0</span></div>
  </div>
  <canvas id="board" width="400" height="400"></canvas>
  <div id="message"></div>
  <div id="hint">Arrows/WASD to move &middot; Space to pause &middot; Enter to restart after game over</div>

<script>
// ---------------------------------------------------------------------
// Game configuration
// ---------------------------------------------------------------------
const GRID_SIZE = 20;              // size of one cell in pixels
const GRID_COUNT = 20;             // number of cells per row/column (400 / 20)
const STARTING_LENGTH = 3;         // initial length of the snake
const BASE_SPEED_MS = 130;         // starting delay between moves (lower = faster)
const MIN_SPEED_MS = 60;           // fastest the game is allowed to get
const SPEEDUP_EVERY_N_FOODS = 4;   // speed increases every N foods eaten

const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const messageEl = document.getElementById('message');

// Persist the high score across page reloads using localStorage.
let bestScore = Number(localStorage.getItem('snakeBestScore') || 0);
bestEl.textContent = bestScore;

// ---------------------------------------------------------------------
// Game state
// ---------------------------------------------------------------------
let snake;          // array of {x, y} cells, snake[0] is the head
let direction;      // current movement direction, e.g. {x: 1, y: 0}
let nextDirection;  // buffered input applied on the next tick (prevents 180° reversal glitches)
let food;           // {x, y} position of the food
let score;
let speedMs;        // current delay between ticks, in milliseconds
let running;        // true while the game loop is actively advancing
let gameOver;
let loopHandle;     // setInterval handle so we can clear/reset the loop

// Sets up (or resets) all game state to start a fresh round.
function initGame() {
  const mid = Math.floor(GRID_COUNT / 2);
  snake = [];
  for (let i = STARTING_LENGTH - 1; i >= 0; i--) {
    snake.push({ x: mid - i, y: mid }); // lay the snake out horizontally, head on the right
  }
  direction = { x: 1, y: 0 };
  nextDirection = direction;
  score = 0;
  speedMs = BASE_SPEED_MS;
  running = true;
  gameOver = false;
  messageEl.textContent = '';
  scoreEl.textContent = score;
  placeFood();
  restartLoop();
}

// Picks a random empty cell for the next food item (never on top of the snake).
function placeFood() {
  let candidate;
  do {
    candidate = {
      x: Math.floor(Math.random() * GRID_COUNT),
      y: Math.floor(Math.random() * GRID_COUNT),
    };
  } while (snake.some(seg => seg.x === candidate.x && seg.y === candidate.y));
  food = candidate;
}

// (Re)starts the interval timer driving the game loop at the current speed.
function restartLoop() {
  if (loopHandle) clearInterval(loopHandle);
  loopHandle = setInterval(tick, speedMs);
}

// One step of game logic: move the snake, check collisions, handle food.
function tick() {
  if (!running || gameOver) return;

  direction = nextDirection;
  const head = snake[0];
  const newHead = { x: head.x + direction.x, y: head.y + direction.y };

  // Wall collision
  if (newHead.x < 0 || newHead.x >= GRID_COUNT || newHead.y < 0 || newHead.y >= GRID_COUNT) {
    return endGame();
  }
  // Self collision (check against every existing body segment)
  if (snake.some(seg => seg.x === newHead.x && seg.y === newHead.y)) {
    return endGame();
  }

  snake.unshift(newHead); // grow the snake by adding the new head

  if (newHead.x === food.x && newHead.y === food.y) {
    // Ate food: keep the tail (snake grows by one) and score a point.
    score++;
    scoreEl.textContent = score;
    placeFood();

    // Speed up gradually so the game gets harder over time.
    if (score % SPEEDUP_EVERY_N_FOODS === 0 && speedMs > MIN_SPEED_MS) {
      speedMs = Math.max(MIN_SPEED_MS, speedMs - 10);
      restartLoop();
    }
  } else {
    snake.pop(); // no food eaten: drop the tail so the snake just moves
  }

  draw();
}

// Ends the current round, updates the high score, and shows a message.
function endGame() {
  gameOver = true;
  running = false;
  clearInterval(loopHandle);
  if (score > bestScore) {
    bestScore = score;
    localStorage.setItem('snakeBestScore', String(bestScore));
    bestEl.textContent = bestScore;
  }
  messageEl.textContent = `Game Over! Final score: ${score}. Press Enter to play again.`;
  draw();
}

// Renders the current game state to the canvas.
function draw() {
  ctx.fillStyle = '#11111b';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Draw food
  ctx.fillStyle = '#f38ba8';
  ctx.fillRect(food.x * GRID_SIZE + 1, food.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2);

  // Draw snake: head in a brighter color, body segments alternating shades
  snake.forEach((seg, i) => {
    ctx.fillStyle = i === 0 ? '#a6e3a1' : '#94e2d5';
    ctx.fillRect(seg.x * GRID_SIZE + 1, seg.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2);
  });
}

// ---------------------------------------------------------------------
// Input handling
// ---------------------------------------------------------------------
const KEY_DIRECTIONS = {
  ArrowUp: { x: 0, y: -1 }, w: { x: 0, y: -1 }, W: { x: 0, y: -1 },
  ArrowDown: { x: 0, y: 1 }, s: { x: 0, y: 1 }, S: { x: 0, y: 1 },
  ArrowLeft: { x: -1, y: 0 }, a: { x: -1, y: 0 }, A: { x: -1, y: 0 },
  ArrowRight: { x: 1, y: 0 }, d: { x: 1, y: 0 }, D: { x: 1, y: 0 },
};

document.addEventListener('keydown', (e) => {
  if (e.key === ' ') {
    e.preventDefault();
    if (!gameOver) running = !running;
    return;
  }
  if (e.key === 'Enter' && gameOver) {
    initGame();
    return;
  }
  const dir = KEY_DIRECTIONS[e.key];
  if (!dir) return;
  e.preventDefault();
  // Prevent the snake from reversing directly into itself.
  const isOpposite = dir.x === -direction.x && dir.y === -direction.y;
  if (!isOpposite) nextDirection = dir;
});

// Kick off the first round.
initGame();
</script>
</body>
</html>
